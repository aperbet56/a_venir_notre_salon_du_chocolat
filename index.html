<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>A venir : notre salon du chocolat</title>
    <!-- CDN font awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    />
    <!-- Importation de la favicon -->
    <link rel="shortcut icon" href="img/favicon.webp" type="image/x-icon" />
    <!-- Importation des polices -->
    <link
      href="https://fonts.googleapis.com/css2?family=Lato&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Muli:wght@300;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css?family=Roboto&display=swap"
    />
    <!-- Importation des styles -->
    <link rel="stylesheet" href="normalize.css" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- Début de la section container -->
    <section class="container">
      <div class="left__container">
        <div class="left">
          <p><span class="days"></span><span class="small"> jours</span></p>
          <p><span class="hours"></span><span class="small"> heures</span></p>
          <p>
            &nbsp;&nbsp;<span class="minutes"></span
            ><span class="small"> minutes</span>
          </p>
          <p>
            &nbsp;&nbsp;<span class="seconds"></span
            ><span class="small"> secondes</span>
          </p>
        </div>
      </div>
      <div class="right">
        <div class="main__info">
          <h1>Un voyage au cœur du chocolat vous attend !</h1>
          <form class="form__subscribe" action="#">
            <input
              type="email"
              class="form"
              placeholder="martin@gmail.com"
              required
            />
            <button type="submit" class="btn">S'incrire</button>
          </form>
        </div>
        <ul class="icon__list">
          <li class="icon__list__item">
            <a href="x.com" class="footer__link"
              ><i class="fa-brands fa-x-twitter"></i
            ></a>
          </li>
          <li class="icon__list__item">
            <a href="facebook.com" class="footer__link"
              ><i class="fa-brands fa-square-facebook"></i
            ></a>
          </li>
          <li class="icon__list__item">
            <a href="instagram.com" class="footer__link"
              ><i class="fa-brands fa-square-instagram"></i
            ></a>
          </li>
        </ul>
      </div>
    </section>
    <!-- Fin de la section container -->
    <!-- Importation du fichier JavaScript -->
    <script src="script.js"></script>
  </body>
</html>
